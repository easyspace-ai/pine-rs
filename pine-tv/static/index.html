<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pine-tv - Pine Script Playground</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Toolbar */
        #toolbar {
            height: 48px;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
        }

        #toolbar-title {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            margin-right: auto;
        }

        .toolbar-select {
            background: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }

        .toolbar-btn {
            background: #0066cc;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toolbar-btn:hover {
            background: #0052a3;
        }

        .toolbar-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        /* Main container with three panels */
        #main-container {
            display: flex;
            height: calc(100% - 48px);
        }

        /* Panels */
        .panel {
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        #chart-panel {
            background: #131722;
        }

        #editor-panel {
            background: #1e1e1e;
        }

        /* Resizer handles */
        .resizer {
            width: 4px;
            background: #333;
            cursor: col-resize;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .resizer:hover {
            background: #0066cc;
        }

        /* Panel headers */
        .panel-header {
            height: 32px;
            background: #2d2d2d;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-bottom: 1px solid #333;
        }

        .panel-title {
            color: #aaa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Chart container */
        #chart-container {
            height: calc(100% - 32px);
            width: 100%;
        }

        /* Editor container */
        #editor-container {
            height: calc(100% - 72px);
            width: 100%;
        }

        #editor-status {
            height: 40px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            padding: 8px 12px;
            color: #888;
            font-size: 12px;
            overflow: auto;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #ffffff33;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Toolbar -->
    <div id="toolbar">
        <span id="toolbar-title">pine-tv</span>
        <select id="symbol-select" class="toolbar-select">
            <option value="BTCUSDT">BTCUSDT</option>
            <option value="ETHUSDT">ETHUSDT</option>
        </select>
        <select id="tf-select" class="toolbar-select">
            <option value="1m">1m</option>
            <option value="5m">5m</option>
            <option value="15m">15m</option>
            <option value="1h" selected>1h</option>
            <option value="4h">4h</option>
            <option value="1d">1d</option>
            <option value="1w">1w</option>
        </select>
        <select id="example-select" class="toolbar-select">
            <option value="">Examples...</option>
            <option value="sma">SMA Indicator</option>
            <option value="rsi">RSI Indicator</option>
            <option value="ema_triple">EMA Triple (30/60/120)</option>
        </select>
        <button id="run-btn" class="toolbar-btn">Run</button>
    </div>

    <!-- Main container with two panels -->
    <div id="main-container">
        <!-- Chart Panel -->
        <div id="chart-panel" class="panel" style="width: 55%;">
            <div class="panel-header">
                <span class="panel-title">Chart</span>
            </div>
            <div id="chart-container"></div>
        </div>

        <div class="resizer" id="resizer-1"></div>

        <!-- Editor Panel -->
        <div id="editor-panel" class="panel" style="width: 45%;">
            <div class="panel-header">
                <span class="panel-title">Pine Script</span>
            </div>
            <div id="editor-container"></div>
            <div id="editor-status">Ready</div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="app.js"></script>
</body>
</html>
